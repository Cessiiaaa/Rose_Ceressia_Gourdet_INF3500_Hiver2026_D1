<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page d'inscription</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
         <main>
            <div class="container">
                <div class="form-div">
                    <h1 id="titre">Ready to start your success story?</h1>
                    <p>Signup to our website and start leafing through your favorite literature today!</p>
                    <form>
                        <label for="fname">Full name</label>
                        <br>
                        <input type="text" id="fname" name="fname" placeholder="Jane Doe">
                        <br>
                        <br>
                        <label for="email">Email</label>
                        <br>
                        <input type="email" id="email" name="email" placeholder="janedoe@gmail.com">
                        <br>         
                        <br>
                        <label id="interests">Area of interest</label>
                        <select>
                            <option> Romance </option>
                            <option> Thriller </option>
                            <option> Action </option>
                            <option> Mystery </option>
                            <option> Historical Fiction  </option>
                            <option> Sci-Fi </option>
                        </select>
                        <br>
                        <br>
                        <br>
                        <input type="checkbox" name="checkbox">
                        <label> I agree to the <a href="#" >Terms & Conditions</a> </label>
                        <br>
                        <br>
                        <button> Sign up</button>
                    </form>
                </div>
                <div class="image">
                    <img src="reading.png" alt="">
                </div>
            </div>
         </main>

    </body>

</html>
