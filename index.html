<!-- A. Instructions : 
1. (4 points) Utilisez HTML pour structurer la page d'inscription. Cela doit inclure : 
• Une division de la page en deux sections principales : une zone de texte/formulaire à 
gauche et une zone pour l'illustration à droite. 
• Un titre principal ("Ready to start your success story?") et un sous-titre descriptif 
("Signup to our website and start leafing through your favorite literature today!"). 
• Des champs de formulaire personnalisés pour : 
Le nom complet ("Full name") avec un espace réservé ("Jane Doe"). 
L'adresse courriel ("Email") avec un espace réservé ("janedoe@mail.com"). 
Le domaine d'intérêt ("Area of interest") sous forme de liste déroulante ou champ texte. 
• Une case à cocher avec le texte d'accompagnement "I agree to the Terms & Conditions", 
où "Terms & Conditions" est un lien hypertexte. 
• Un bouton de soumission "Sign up". 
• L'intégration d’une image illustrative de votre choix (exemple : la dame avec le livre et le 
chat) dans la section de droite. -->



<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page d'inscription</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
         <main>
            <div class="container">
                <div class="form-div">
                    <h1 id="titre">Ready to start your success story?</h1>
                    <p>Signup to our website and start leafing through your favorite literature today!</p>
                    <form>
                        <label for="fname">Full name</label>
                        <input type="text" id="fname" name="fname" placeholder="Jane Doe">
                        <br>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="janedoe@gmail.com">
                        <br>         
                        <label>Area of interest</label>
                        <select>
                            <option> Romance </option>
                            <option> Romance </option>
                            <option> Romance </option>
                            <option> Romance </option>
                            <option> Romance </option>
                            <option> Romance </option>
                        </select>
                        <br>
                        <br>
                        <br>
                        <input type="checkbox" name="checkbox">
                        <label> I agree to the <a href="#" >Terms & Conditions</a> </label>
                        <br>
                        <button> Sign up</button>
                    </form>
                </div>
                <div class="image">
                    <img src="reading.png">
                </div>
            </div>
         </main>

    </body>

</html>
